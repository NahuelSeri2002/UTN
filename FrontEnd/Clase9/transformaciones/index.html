<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transformaciones - Trasnform</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <h1>Transformaciones - Trasnform</h1>
            
            <section>
                <h2>1. Traslacion: Translate()</h2>
                <div class="cajas-content">
                    <div class="caja caja-translate">Translate</div>
                    <div class="caja caja-translate-y">Translate Y</div>
                    <div class="caja caja-translate-x">Translate X</div>
                </div>
            </section>
            
            <section>
                <h2>2. Escala: Scale()</h2>
                <div class="cajas-content">
                    <div class="caja caja-scale-up">Scale Up</div>
                    <div class="caja caja-scale-down">Scale Down</div>
                </div>
            </section>

            <section>
                <h2>3. Rotacion: Rotate()</h2>
                <div class="cajas-content">
                    <div class="caja caja-rotate">Rotate</div>
                    <div class="caja caja-rotate-2">Rotate 2</div>
                    <div class="caja caja-rotate-3">Rotate 3</div>
                </div>
            </section>

            <section>
                <h2>4. Inclinar Bordes: Skew()</h2>
                <div class="cajas-content">
                    <div class="caja caja-skew">Skew</div>
                    <div class="caja caja-skew-2">Skew X</div>
                    <div class="caja caja-skew-3">Skew Y</div>
                </div>
            </section>
            
        </main>
    </body>
</html>
