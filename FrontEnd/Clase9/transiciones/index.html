<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Transiciones - Transitions</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main>
            <h1>Transiciones - Transitions</h1>

            <section>
                <h2>Boton - Transition All</h2>
                <div class="cajas-content">
                    <button class="boton-magico linear">LINEAR</button>
                    <button class="boton-magico ease">EASE</button>
                    <button class="boton-magico ease-in">EASE-IN</button>
                    <button class="boton-magico ease-out">EASE-OUT</button>
                    <button class="boton-magico ease-in-out">EASE-IN-OUT</button>
                </div>
            </section>

            <section>
                <h2>Transition Width- Height</h2>
                <div class="cajas-content">
                    <div class="caja width-height">Transition Width- Height</div>
                </div>
            </section>

            <section>
                <h2>Delay</h2>
                <div class="cajas-content">
                    <div class="caja delay">Delay</div>
                </div>
            </section>

        </main>
    </body>
</html>
