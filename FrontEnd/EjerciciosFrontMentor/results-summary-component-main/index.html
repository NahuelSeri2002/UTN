<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="./styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <title>Frontend Mentor | Results summary component</title>
  </head>
  <body>
    <article>
      <div class="content-firsthalfh">
        <h3>Your Result</h3>
        <div class="circle-numbers">
          <p class="bignumber">76</p>
          <p class="smallnumber">of 100</p>
        </div>
        <h2>Great</h2>
        <p class="text">You scored higher than 65% of the people who have taken these tests.</p>
      </div>
      <div class="content-secondhalfh">
        <h3>Summary</h3>
        <div class="boxes">
          <div class="box1">
            <div class="box-title">
              <img src="./assets/images/icon-reaction.svg" alt=""><p class="reaction">Reaction</p>
            </div>
            <p class="numbers"><span class="black">80</span> / 100</p>
          </div>
          <div class="box2">
            <div class="box-title">
              <img src="./assets/images/icon-memory.svg" alt=""><p class="memory">Memory</p>
            </div>
            <p class="numbers"><span class="black">92</span> / 100</p>
          </div>
          <div class="box3">
            <div class="box-title">
              <img src="./assets/images/icon-verbal.svg" alt=""><p class="verbal">Verbal</p>
            </div>
            <p class="numbers"><span class="black">62</span> / 100</p></div>
          <div class="box4">
            <div class="box-title">
              <img src="./assets/images/icon-visual.svg" alt=""><p class="visual">Visual</p>
            </div>
            <p class="numbers"> <span class="black">73</span> / 100</p>
          </div>
        </div>
        <button>Continue</button>
      </div>
    </article>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Nahuel Seri</a>.
    </footer>
</body>
</html>
