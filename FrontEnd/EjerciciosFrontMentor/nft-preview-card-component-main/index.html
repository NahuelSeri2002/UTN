<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <title>Frontend Mentor | NFT preview card component</title>
    <link rel="stylesheet" href="./Styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
  </head>
  <body>
    <article>
      <div class="content-image">
        <div class="content-eye">
          <img src="./images/icon-view.svg" alt="" class="eye">
        </div>
        <img src="./images/image-equilibrium.jpg" alt="" class="image-cube">
      </div>
      <h3 class="title">Equilibrium #3429</h3>
      <p class="text">Our Equilibrium collection promotes balance and calm.</p>
      <div class="content-numbers">
        <div class="number">
          <img src="./images/icon-ethereum.svg" alt="">
          <p class="eth">0.041 ETH</p>
        </div>
        <div class="days">
          <img src="./images/icon-clock.svg" alt="">
          <p class="day">3 days left</p>
        </div>
      </div>
      <div class="content-creation">
        <img src="./images/image-avatar.png" alt="" class="image">
        <p class="name">Creation of <span>Jules Wyvern</span></p>
        </div>
    </article>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Nahuel Seri</a>.
    </footer>
  </body>
</html>
