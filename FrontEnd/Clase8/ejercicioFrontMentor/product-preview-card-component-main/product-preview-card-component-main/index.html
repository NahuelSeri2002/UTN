<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    <link rel="stylesheet" href="./styles/style.css">
    <title>Frontend Mentor | Product preview card component</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
  <body>

    <article>
      <div class="cont-images">
        <img class="desktop-perfume" src="./images/image-product-desktop.jpg" alt="Perfume Image Desktop">
        <img class="mobile-perfume" src="./images/image-product-mobile.jpg" alt="Perfume Image Mobile">
      </div>
      <div class="cont-text">
        <h3>Perfume</h3>
        <h2>Gabrielle Essence Eau De Parfum</h2>
        <p class="text">A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>
        <div class="cont-prices">
          <p class="sales-price">$149.99</p>
          <p class="original-price">$169.99</p>
        </div>
        <button><img src="./images/icon-cart.svg" alt="Cart Icon">Add to Cart</button>
      </div>
    </article>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Nahuel Seri</a>.
    </footer>
  </body>
</html>
