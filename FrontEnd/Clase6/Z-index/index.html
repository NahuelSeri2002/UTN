<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Z-Index</h1>
        <article>
            <h2>z-index - Quien va adelante?</h2>
            <p>Cuando hay varios elementos posicionados en lugares similares, se superponen, z-index decide cual se ve por encima. Mayor numero = mas al frente. Solo funciona con position != static.</p>
            <div class="stack">
                <div class="capa capa-1">z-index 1</div>
                <div class="capa capa-2">z-index 3</div>
                <div class="capa capa-3">z-index 2</div>
            </div>
        </article>
    </body>
</html>
