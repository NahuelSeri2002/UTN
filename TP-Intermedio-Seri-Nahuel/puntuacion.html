<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MusicBoxed - Puntuacion</title>
        <link rel="stylesheet" href="./css/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/03c04b034a.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <nav class="navbar">
                <a href="./index.html" class="logo"><i class="fa-regular fa-headphones"></i>MusicBoxed</a>
                <ul class="nav-links">
                    <li><a href="./index.html">Inicio</a></li>
                    <li><a href="./puntuacion.html">Puntuacion</a></li>
                    <li><a href="./galeria.html">Galeria</a></li>
                    <li><a href="./iniciarsesion.html">Iniciar Sesion</a></li>
                    <li><a href="./registrarse.html">Registrarse</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <section class="puntuacion">
                <h2>Puntuacion</h2>
                <div class="cards-container">
                    <div class="card card-album1">
                        <h3>The Dark Side of the Moon</h3>
                        <img src="./assets/img/darksideofthemoon.jpg" alt="The Dark Side of The Moon">
                        <div class="rating-stars">
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                        </div>
                        <div class="card-btn">
                            <button class="btn .btn-primary like"><i class="fa-solid fa-thumbs-up"></i></button>
                            <button class="btn .btn-primary dislike"><i class="fa-solid fa-thumbs-down"></i></button>
                        </div>
                    </div>
                    <div class="card card-album2">
                        <h3>Reality Awaits</h3>
                        <img src="./assets/img/realityawaits.jpg" alt="Reality Awaits">
                        <div class="rating-stars">
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star">&#9733;</span>
                            <span class="star dislike-star">&#9733;</span>
                        </div>
                        <div class="card-btn">
                            <button class="btn .btn-primary like"><i class="fa-solid fa-thumbs-up"></i></button>
                            <button class="btn .btn-primary dislike"><i class="fa-solid fa-thumbs-down"></i></button>
                        </div>
                    </div>
                    <div class="card card-album3"></div>  
                    <div class="card card-album4"></div>
                </div>
            </section>
        </main>

         <footer>
            <ul class="footer-nav">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./puntuacion.html">Puntuacion</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./iniciarsesion.html">Iniciar Sesion</a></li>
                <li><a href="./registrarse.html">Registrarse</a></li>
            </ul>
            <div class="footer-social">
                <a href="#" aria-label="Instagram" class="instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Spotify" class="spotify"><i class="fa-brands fa-spotify"></i></a>
            </div>
            <p>© 2026 MusicBoxed. Todos los derechos reservados</p>
        </footer>
    </body>
</html>
