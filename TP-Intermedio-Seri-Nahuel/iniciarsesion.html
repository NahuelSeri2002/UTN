        </header>

            <main>
                <h2>Iniciar Sesion</h2>
                <section class="inicio-sesion">
                    <form action="./index.html" class="default-form">
                        <div>
                            <p>Correo electronico</p>  
                            <input type="email" placeholder="tunombre@gmail.com" required> 
                        </div>
                        <div>
                            <p>Contraseña</p>
                            <input type="password" placeholder="contraseña" required>
                        </div>
                        <div>
                            <label>
                                <input type="checkbox" class="checkbox">
                                <span>Recordar usuario</span>
                            </label>
                        </div>
                        <div class="enviar">
                        <button type="submit" class="envio btn  btn-form">Iniciar Sesion</button>
                        <button type="reset" class="resetear btn btn-form">Limpiar Formulario</button>
                    </div>
                    </form>
                </section>
            </main>

         <footer>
