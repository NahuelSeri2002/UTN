<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>MusicBoxed - Registrarse</title>
        <link rel="stylesheet" href="./css/styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Syne:wght@400..800&display=swap" rel="stylesheet">
        <script src="https://kit.fontawesome.com/03c04b034a.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <nav class="navbar">
                <a href="./index.html" class="logo"><i class="fa-regular fa-headphones"></i>MusicBoxed</a>
                <ul class="nav-links">
                    <li><a href="./index.html">Inicio</a></li>
                    <li><a href="./puntuacion.html">Puntuacion</a></li>
                    <li><a href="./galeria.html">Galeria</a></li>
                    <li><a href="./iniciarsesion.html">Iniciar Sesion</a></li>
                    <li><a href="./registrarse.html">Registrarse</a></li>
                </ul>
            </nav>
        </header>

        <main>
            <h2>Registrarse</h2>
            <section class="registrarse">
                <form action="./index.html" class="default-form">
                    <div>
                        <p>Nombre de usuario</p>
                        <input type="text" placeholder="Tu nombre" required>
                    </div>
                    <div>
                        <p>Correo electronico</p>
                        <input type="email" placeholder="tunombre@ejemplo.com" required>
                    </div>
                    <div>
                        <p>Contraseña</p>
                       <input type="password" placeholder="contraseña" required> 
                    </div>
                    <div>
                        <p>Genero</p>
                        <select required>
                            <option value="" disabled selected>Seleccione una opción</option>
                            <option value="Hombre">Hombre</option>
                            <option value="Mujer">Mujer</option>
                            <option value="Prefiero no decirlo">Prefiero no decirlo</option>
                        </select>
                    </div>
                    <div class="terminos">
                        <label>
                            <input type="checkbox" class="checkbox" required>
                            <span>Soy al menos mayor de 16 años y acepto los términos de uso</span>
                        </label>
                        <label>
                            <input type="checkbox" class="checkbox" required>
                            <span>Acepto la Política de Privacidad y doy mi consentimiento para el procesamiento de mi información personal de acuerdo con la misma</span>
                        </label>
                    </div>
                    <div class="enviar">
                        <button type="submit" class="envio btn  btn-form">Registrarse</button>
                        <button type="reset" class="resetear btn btn-form">Limpiar Formulario</button>
                    </div>
                </form>
            </section>
        </main>

         <footer>
            <ul class="footer-nav">
                <li><a href="./index.html">Inicio</a></li>
                <li><a href="./puntuacion.html">Puntuacion</a></li>
                <li><a href="./galeria.html">Galeria</a></li>
                <li><a href="./iniciarsesion.html">Iniciar Sesion</a></li>
                <li><a href="./registrarse.html">Registrarse</a></li>
            </ul>
            <div class="footer-social">
                <a href="#" aria-label="Instagram" class="instagram"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" aria-label="Spotify" class="spotify"><i class="fa-brands fa-spotify"></i></a>
            </div>
            <p>© 2026 MusicBoxed. Todos los derechos reservados</p>
        </footer>
    </body>
</html>
